youtube_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'youtube') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'youtube') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'youtube_analytics') }}"
      schema: analytics
      threads: 2
