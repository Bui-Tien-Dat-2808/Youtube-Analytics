
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/project/interfaces/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/project
    SPARK_LOCAL_IP: 127.0.0.1
    PYSPARK_SUBMIT_ARGS: --driver-memory 1g --packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.postgresql:postgresql:42.7.4 pyspark-shell
  volumes:
    - ./:/opt/project
    - airflow-logs:/opt/airflow/logs
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:15
    container_name: youtube-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/database/init:/docker-entrypoint-initdb.d

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email admin@example.com
      "

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver
    restart: unless-stopped
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init

  spark:
    image: spark:4.1.1-python3
    platform: linux/amd64
    container_name: youtube-spark
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    env_file:
      - .env
    environment:
      SPARK_MASTER_HOST: spark
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./:/opt/project

  dbt:
    build:
      context: .
      dockerfile: docker/Dockerfile.dbt
    container_name: youtube-dbt
    env_file:
      - .env
    working_dir: /opt/project
    command: sleep infinity
    volumes:
      - ./:/opt/project
    depends_on:
      - postgres

  superset:
    image: apache/superset:4.1.1
    container_name: youtube-superset
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin
      --username ${SUPERSET_ADMIN_USERNAME}
      --firstname Superset
      --lastname Admin
      --email admin@example.com
      --password ${SUPERSET_ADMIN_PASSWORD} &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
    ports:
      - "8088:8088"
    depends_on:
      - postgres

volumes:
  postgres-data:
  airflow-logs:
